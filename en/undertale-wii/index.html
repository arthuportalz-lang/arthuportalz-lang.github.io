<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        @font-face {
            font-family: "mainfont";
            src: url("8bitoperator.woff2") format("woff2");
            font-weight: normal;
            font-style: normal;
        }

        html, body {
            margin: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: black;
            color: white;
            font-family: "mainfont";
        }

        img {
            max-width: 80%;
            height: auto;
        }

        .teh-space {
            height: 9rem;
        }

        .teh-lil-space {
            height: 2rem;
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            font-size: 200%;
            background-color: #303030;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 20px;

            z-index: 1000;
        }

        a {
            color: white;
            text-decoration: underline;
            text-decoration-color: white;
        }
    </style>
    
    <title>Undertale Wii</title>
    <link rel=icon href="../../assets/imgs/utwii-icon.png">
    <meta property="og:title" content="Undertale Wii"/>
    <meta property="og:description" content="UNDERTALE... ported to the Wii!"/>
    <meta property="og:url" content="https://arthuportalz-lang.github.io/en/undertale-wii"/>
    <meta property="og:type" content="website"/>
    <meta property="og:image" content="https://arthuportalz-lang.github.io/assets/imgs/utwii-640x480.png"/>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
    
<body>
    <div class="topbar">
        <a href="https://arthuportalz-lang.github.io" class="active">HOME</a>
    </div>

    <div class="teh-space"></div>

    <img style="width: 50%; height: 50%;" src="../../assets/imgs/utwii-logo.png" alt="Undertale Wii" >

    <h1 style="text-align: center;">... the RPG game where you don't have to destroy anyone...<br>ported to the Wii, using the <i>awesome</i> 2D framework based in Lua,<br><a href="https://github.com/HTV04/wiilove"><h1 style="font-size: 150px; text-align: center;">WiiLÖVE!!!</h1></a></h1>

    <h1>Do you want to check it out or test it on your Wii?</h1>
    <a href="https://github.com/arthuportalz-lang/Undertale-Wii/releases"><h1>The latest release is here!</h1></a>

    <div class="teh-lil-space"></div>
</body>
</html>
